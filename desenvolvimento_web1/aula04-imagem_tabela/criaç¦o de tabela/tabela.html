
<html>
    <head>

    <title>Tabelas</title>

    </head>
    <body>
        <!--table é a tag de criação de tabela-->
        <!--border define a borda das celulas da tabela em um todo-->
        <table border="1">
            <!--tr é a tag de linha de tabela-->
            <tr>
                <!--td é a tag é o conteúdo de cada quadrado da tabela-->
                <td>Célula 1</td>
                <td>Célula 2</td>
                <td>Célula 3</td>
            </tr>
            <tr>
                <td>Célula 4</td>
                <td>Célula 5</td>
                <td>Célula 6</td>
            </tr>
        </table> <br> 

        <table border="1">
            <tr>
                <!--colspan é para colocar quantas mesclagens de colunas na linha-->
                <td colspan="3">Célula 1</td>
            </tr>
            <tr>
                <td>Célula 2</td>
                <td>Célula 3</td>
                <td>Célula 4</td>
            </tr>
        </table> <br>

        <table border="1">
            <tr>
                <!--Rowspan é a quebra da linha, transformando ela na coluna por um todo-->
                <td rowspan="3">Célula 1</td>
                <td>Célula 2</td>
            </tr>
            <tr>
                <td>Célula 3</td>
            </tr>
            <tr>
                <td>Célula 4</td>
            </tr>
        </table>
    </body>
</html>
